name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-unit:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            vaalikone-frontend/package-lock.json

      - name: Install backend deps
        run: npm ci

      - name: Install frontend deps
        run: npm ci
        working-directory: vaalikone-frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: vaalikone-frontend

      - name: Unit + route tests
        run: npm test

  e2e-api:
    name: E2E API tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vaalikone
          POSTGRES_PASSWORD: vaalikone_password
          POSTGRES_DB: vaalikone
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vaalikone"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://vaalikone:vaalikone_password@localhost:5432/vaalikone
      ADMIN_SECRET: test-secret
      NODE_ENV: test
      PORT: 3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run migrations
        run: npm run migrate

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start backend
        run: |
          npm start &
          for i in {1..30}; do
            curl -sf http://localhost:3000/api/health && exit 0
            sleep 1
          done
          echo "Backend failed to start"
          exit 1

      - name: Run E2E API tests
        run: npm run test:e2e:api

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7

  deploy:
    name: Deploy to UpCloud
    needs: [lint-and-unit, e2e-api]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 80.69.172.220 >> ~/.ssh/known_hosts

      - name: Rsync to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='test-results' \
            --exclude='laptop*' \
            --exclude='upcloud*' \
            --exclude='.claude' \
            ./ root@80.69.172.220:/opt/vaalikone/

      - name: Build & restart services
        run: |
          ssh -i ~/.ssh/deploy_key root@80.69.172.220 \
            "cd /opt/vaalikone && docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d"

      - name: Verify deployment
        run: |
          for i in {1..15}; do
            if curl -sf https://avoinvaalikone.fi/api/health; then
              echo "✓ Deployment verified"
              exit 0
            fi
            sleep 4
          done
          echo "✗ Health check failed after deploy"
          exit 1
