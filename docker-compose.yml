services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: vaalikone-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vaalikone
      POSTGRES_PASSWORD: vaalikone_password
      POSTGRES_DB: vaalikone
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaalikone"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vaalikone-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://vaalikone:vaalikone_password@db:5432/vaalikone
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend
  frontend:
    build:
      context: ./vaalikone-frontend
      dockerfile: Dockerfile
    container_name: vaalikone-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3000

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: vaalikone-network
