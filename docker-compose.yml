services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: vaalikone-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vaalikone
      POSTGRES_PASSWORD: vaalikone_password
      POSTGRES_DB: vaalikone
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaalikone"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vaalikone-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://vaalikone:vaalikone_password@db:5432/vaalikone
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:80}
      ADMIN_SECRET: ${ADMIN_SECRET:-password}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_FROM: ${SMTP_FROM:-noreply@vaalikone.fi}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Local SMTP capture (dev only) — web UI at http://localhost:8025
  mailpit:
    image: axllent/mailpit
    container_name: vaalikone-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

  # Frontend
  frontend:
    build:
      context: ./vaalikone-frontend
      dockerfile: Dockerfile
      args:
        VITE_NODE_ENV: ${VITE_NODE_ENV:-production}
        VITE_API_BASE: ${VITE_API_BASE:-}
    container_name: vaalikone-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: vaalikone-network
