services:
  # Don't publish the database port in production. Docker-published ports bind
  # 0.0.0.0 and bypass the host firewall; other services reach the db over the
  # internal compose network without it being exposed to the internet.
  db:
    ports: !reset []

  frontend:
    ports: !reset []

  caddy:
    image: caddy:alpine
    container_name: vaalikone-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local
