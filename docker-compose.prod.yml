services:
  frontend:
    ports: !reset []

  caddy:
    image: caddy:alpine
    container_name: vaalikone-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local
